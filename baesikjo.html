<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배식조 편성표</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --border:#2e3348;
  --olive:#5c7a4e;
  --olive-l:#7a9e6a;
  --olive-dim:#3a4e30;
  --red:#e05c5c;
  --red-dim:#3d1f1f;
  --red-l:#ff8080;
  --yellow:#e0b84e;
  --yellow-dim:#3d3010;
  --blue:#4e7ae0;
  --blue-dim:#1f2c4a;
  --text:#e8eaf0;
  --text-dim:#7a8099;
  --text-muted:#4a5070;
  --mono:'IBM Plex Mono',monospace;
}

body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:900;letter-spacing:-0.3px;}
.hdr-title span{color:var(--olive-l);}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;}
.icon-btn:hover{border-color:var(--olive);color:var(--olive-l);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:13px;padding:6px 10px;border-radius:6px;transition:color 0.15s;}
.back-btn:hover{color:var(--text);}

/* ── CALENDAR SCREEN ── */
#scrCal{background:var(--bg);}
.cal-body{flex:1;padding:20px;max-width:900px;margin:0 auto;width:100%;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-month{font-size:22px;font-weight:900;letter-spacing:-0.5px;}
.cal-nav-btns{display:flex;gap:6px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:6px 0;letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);}
.cal-dow:first-child{color:var(--red);}
.cal-dow:last-child{color:var(--blue);}
.cal-day{min-height:52px;border-radius:8px;padding:6px 8px;font-size:12px;border:1px solid transparent;transition:all 0.15s;position:relative;}
.cal-day.other-month{opacity:0.2;}
.cal-day.today .dn{background:var(--olive);color:white;border-radius:50%;}
.cal-day.sun .dn{color:var(--red);}
.cal-day.sat .dn{color:var(--blue);}
.cal-day.hol{background:var(--red-dim);}
.cal-day.hol .dn{color:var(--red-l);}
.dn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);border-radius:50%;}

/* week blocks */
.week-block{grid-column:1/-1;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;cursor:pointer;border-radius:10px;padding:2px;border:1.5px solid transparent;transition:all 0.2s;}
.week-block:hover{border-color:var(--olive);background:rgba(92,122,78,0.06);}
.week-block.has-data{border-color:var(--olive-dim);}
.week-label{position:absolute;top:4px;right:6px;font-size:8px;font-family:var(--mono);color:var(--text-muted);}
.week-dot{position:absolute;bottom:4px;left:6px;display:flex;gap:2px;}
.week-dot span{width:4px;height:4px;border-radius:50%;background:var(--olive);}

/* ── WEEK SCREEN ── */
#scrWeek{background:var(--bg);}
.week-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* toolbar */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.tool-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all 0.15s;user-select:none;}
.tool-btn:hover{border-color:var(--text-dim);}
.tool-btn.active-jjam{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-dim);}
.tool-btn.active-plus{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.tool-btn.active-hol{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.tool-btn.active-con{border-color:var(--olive-l);color:var(--olive-l);background:var(--olive-dim);}
.tool-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.tool-right{margin-left:auto;display:flex;gap:8px;}

/* 새 툴바 - 제한사항 메인 버튼 */
.tool-btn-main{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:12px;border:2px solid var(--olive);background:var(--olive-dim);color:var(--olive-l);cursor:pointer;font-family:inherit;font-size:16px;font-weight:900;transition:all 0.15s;letter-spacing:-0.3px;}
.tool-btn-main:hover{background:var(--olive);color:white;}
.tool-btn-main.active-con{background:var(--olive);color:white;}
/* 관리 메뉴 */
.admin-menu-wrap{position:relative;}
.admin-toggle{padding:16px 18px !important;border-radius:12px !important;font-size:13px !important;height:100%;}
.admin-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px;z-index:100;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5);flex-direction:column;gap:2px;}
.admin-dropdown.open{display:flex;}
.dd-item{text-align:left;padding:11px 14px;border-radius:8px;border:none;background:none;color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all 0.12s;}
.dd-item:hover{background:var(--surface2);}
.dd-item.active-jjam{background:var(--yellow-dim);color:var(--yellow);}
.dd-item.active-plus{background:var(--blue-dim);color:var(--blue);}
.dd-item.active-hol{background:var(--red-dim);color:var(--red);}
.dd-sep{height:1px;background:var(--border);margin:4px 0;}
.dd-gen{color:var(--olive-l);font-weight:700;}
.dd-reset{color:var(--red);}
/* 제한사항 저장 버튼 (주간표 아래) */
.con-save-wrap{padding:16px 0 8px;}
.btn-save-big{width:100%;padding:16px;background:var(--olive);color:white;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer;transition:all 0.15s;letter-spacing:-0.3px;}
.btn-save-big:hover{background:var(--olive-l);}

/* week grid */
.wk-grid-wrap{flex:1;overflow-y:auto;padding:16px;}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.wk-col{display:flex;flex-direction:column;gap:6px;}
.wk-col-hd{text-align:center;padding:8px 4px;border-radius:7px;background:var(--surface);border:1px solid var(--border);}
.wk-col-hd .dow{font-size:11px;font-weight:700;font-family:var(--mono);}
.wk-col-hd .date{font-size:10px;color:var(--text-dim);margin-top:2px;}
.wk-col-hd.is-sun .dow{color:var(--red);}
.wk-col-hd.is-sat .dow{color:var(--blue);}
.wk-col-hd.is-hol{background:var(--red-dim);border-color:var(--red);}
.wk-col-hd.is-hol .dow,.wk-col-hd.is-hol .date{color:var(--red-l);}

/* slot cells */
.slot-cell{border-radius:8px;border:1.5px solid var(--border);background:var(--surface);padding:8px 6px;min-height:64px;cursor:pointer;transition:all 0.15s;position:relative;display:flex;flex-direction:column;gap:4px;}
.slot-cell:hover{border-color:var(--text-muted);}
.slot-label{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:0.8px;font-family:var(--mono);}
.slot-names{display:flex;flex-direction:column;gap:2px;flex:1;justify-content:center;}
.slot-name-tag{font-size:11px;font-weight:700;background:var(--olive-dim);color:var(--olive-l);border-radius:4px;padding:2px 6px;text-align:center;}
.slot-name-tag.warn{background:var(--red-dim);color:var(--red-l);}
.slot-empty{font-size:10px;color:var(--text-muted);text-align:center;padding:8px 0;}

/* slot states */
.slot-cell.is-jjam{border-color:var(--yellow);background:var(--yellow-dim);}
.slot-cell.is-jjam .slot-label{color:var(--yellow);}
.slot-cell.is-hol-slot{border-color:var(--red);background:var(--red-dim);opacity:0.6;pointer-events:none;}
.slot-cell.is-plus .slot-label::after{content:' +1';color:var(--blue);}
.slot-cell.blocked-me{border-color:var(--red) !important;background:var(--red-dim) !important;}
.slot-cell.blocked-me .slot-label{color:var(--red-l);}

/* constraint mode */
.con-slot{border-radius:8px;border:1.5px solid var(--border);background:var(--surface);padding:10px 6px;cursor:pointer;transition:all 0.15s;text-align:center;font-size:11px;font-weight:700;color:var(--text-dim);user-select:none;}
.con-slot:hover{border-color:var(--text-dim);}
.con-slot.blocked{border-color:var(--red);background:var(--red-dim);color:var(--red-l);}
.con-slot.con-brunch{min-height:80px;display:flex;align-items:center;justify-content:center;}

/* name picker */
.name-picker{background:var(--surface);border-top:1px solid var(--border);padding:14px 16px;flex-shrink:0;}
.name-picker-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;font-family:var(--mono);}
.name-chips{display:flex;flex-wrap:wrap;gap:7px;}
.name-chip{padding:7px 16px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;background:var(--surface2);color:var(--text-dim);transition:all 0.15s;user-select:none;}
.name-chip:hover{border-color:var(--olive);color:var(--text);}
.name-chip.sel{background:var(--olive-dim);color:var(--olive-l);border-color:var(--olive);}

/* gen result */
.gen-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.fairness-score{font-family:var(--mono);font-size:13px;font-weight:600;}
.fairness-score .score{font-size:20px;font-weight:900;color:var(--olive-l);}
.balance-bars{display:flex;gap:6px;flex:1;align-items:flex-end;height:32px;}
.bbar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.bbar{width:100%;border-radius:3px;background:var(--olive);transition:height 0.4s;min-height:2px;}
.bbar.jjam{background:var(--yellow);}
.bbar-name{font-size:8px;color:var(--text-muted);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:28px;}

/* ── SETTINGS SCREEN ── */
#scrSettings{background:var(--bg);}
.settings-body{flex:1;padding:20px;max-width:500px;margin:0 auto;width:100%;}
.settings-section{margin-bottom:28px;}
.settings-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:12px;}
.mem-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.mem-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.mem-row .mname{font-size:13px;font-weight:700;flex:1;}
.mem-row .morder{font-size:11px;color:var(--text-muted);font-family:var(--mono);}
.mem-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0;line-height:1;transition:color 0.15s;}
.mem-del:hover{color:var(--red);}
.add-row{display:flex;gap:8px;}
.add-row input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.15s;}
.add-row input:focus{border-color:var(--olive);}
.add-row input::placeholder{color:var(--text-muted);}
.btn-add{padding:10px 18px;background:var(--olive-dim);color:var(--olive-l);border:1.5px solid var(--olive-dim);border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-add:hover{background:var(--olive);color:white;border-color:var(--olive);}

/* gen button */
.btn-gen{padding:9px 20px;background:var(--olive);color:white;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-gen:hover{background:var(--olive-l);}
.btn-save-con{padding:9px 20px;background:var(--olive-dim);color:var(--olive-l);border:1.5px solid var(--olive);border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-save-con:hover{background:var(--olive);color:white;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 개인별 통계 패널 */
.stats-panel{padding:8px 16px 24px;}
.stats-head{font-size:12px;font-weight:900;color:var(--text);letter-spacing:-0.3px;margin:16px 0 12px;}
.stats-panel:empty{display:none;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.stat-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.stat-name{font-size:14px;font-weight:900;}
.stat-counts{font-size:11px;color:var(--text-dim);}
.stat-counts b{color:var(--olive-l);font-size:13px;}
.stat-counts b.jj{color:var(--yellow);}
.stat-bar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.stat-bar{height:100%;background:linear-gradient(90deg,var(--olive),var(--olive-l));border-radius:3px;transition:width 0.4s;}
.stat-slots{display:flex;flex-wrap:wrap;gap:4px;}
.stat-slot{font-size:10px;font-family:var(--mono);background:var(--surface2);color:var(--text-dim);border-radius:5px;padding:3px 7px;}
.stat-slot.jjam{background:var(--yellow-dim);color:var(--yellow);}
.stat-slot.warn{background:var(--red-dim);color:var(--red-l);}
.stat-empty{font-size:10px;color:var(--text-muted);}

/* 슬롯 추가 버튼 */
.slot-add{font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface2);border:1px dashed var(--border);border-radius:4px;padding:3px 6px;text-align:center;transition:all 0.12s;}
.slot-add:hover{border-color:var(--olive);color:var(--olive-l);}

/* 교체 모달 */
.swap-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998;align-items:flex-end;justify-content:center;}
.swap-overlay.open{display:flex;}
.swap-modal{background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;border:1px solid var(--border);width:100%;max-width:500px;max-height:75vh;display:flex;flex-direction:column;padding:20px;animation:slideUp 0.2s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.swap-title{font-size:17px;font-weight:900;letter-spacing:-0.3px;}
.swap-sub{font-size:12px;color:var(--text-dim);font-family:var(--mono);margin-top:3px;margin-bottom:16px;}
.swap-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.swap-item{display:flex;align-items:center;gap:8px;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;text-align:left;transition:all 0.12s;}
.swap-item:hover:not(:disabled){border-color:var(--olive);}
.swap-item.blocked{border-color:var(--red-dim);}
.swap-item.current{border-color:var(--olive);background:var(--olive-dim);}
.swap-item.disabled{opacity:0.4;cursor:not-allowed;}
.swap-warn{font-size:10px;color:var(--red-l);background:var(--red-dim);padding:2px 7px;border-radius:4px;margin-left:auto;}
.swap-tag{font-size:10px;color:var(--text-muted);margin-left:auto;}
.swap-tag.cur{color:var(--olive-l);}
.swap-actions{display:flex;gap:8px;margin-top:14px;}
.swap-remove{flex:1;padding:13px;border-radius:10px;border:1.5px solid var(--red);background:none;color:var(--red);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.swap-cancel{flex:1;padding:13px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}

/* 횟수 입력 모달 */
.counts-modal{max-height:80vh;}
.counts-summary{font-size:12px;font-family:var(--mono);padding:10px 12px;border-radius:8px;background:var(--surface2);margin-bottom:12px;text-align:center;}
.counts-summary.ok{color:var(--olive-l);}
.counts-summary.bad{color:var(--red-l);}
.counts-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.count-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);}
.count-name{flex:1;font-size:14px;font-weight:700;}
.count-stepper{display:flex;align-items:center;gap:0;background:var(--bg);border-radius:9px;border:1px solid var(--border);overflow:hidden;}
.count-stepper button{width:38px;height:38px;border:none;background:none;color:var(--olive-l);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.12s;}
.count-stepper button:active{background:var(--olive-dim);}
.count-val{width:40px;text-align:center;font-size:16px;font-weight:900;font-family:var(--mono);color:var(--text);}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--text-muted);font-size:13px;}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--olive-l);border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* hol badge */
.hol-badge{font-size:8px;background:var(--red-dim);color:var(--red-l);border-radius:3px;padding:1px 4px;font-family:var(--mono);}
.jjam-badge{font-size:8px;background:var(--yellow-dim);color:var(--yellow);border-radius:3px;padding:1px 4px;font-family:var(--mono);}

@media(max-width:600px){
  .wk-grid{grid-template-columns:repeat(7,minmax(80px,1fr));overflow-x:auto;}
  .wk-grid-wrap{overflow-x:auto;}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- 횟수 입력 모달 -->
<div class="swap-overlay" id="countsOverlay" onclick="closeCountsModal()">
  <div class="swap-modal counts-modal" onclick="event.stopPropagation()">
    <div class="swap-title">🔢 인원별 횟수 입력</div>
    <div class="counts-summary" id="countsSummary"></div>
    <div class="counts-list" id="countsList"></div>
    <div class="swap-actions">
      <button class="swap-remove" style="border-color:var(--border);color:var(--text-dim);" onclick="autoFillCounts()">자동 균등</button>
      <button class="swap-cancel" style="background:var(--olive);color:#fff;border-color:var(--olive);" onclick="saveCountsModal()">저장</button>
    </div>
  </div>
</div>

<!-- 교체 모달 -->
<div class="swap-overlay" id="swapOverlay" onclick="closeSwap()">
  <div class="swap-modal" onclick="event.stopPropagation()">
    <div class="swap-title" id="swapTitle">교체</div>
    <div class="swap-sub" id="swapSub"></div>
    <div class="swap-list" id="swapList"></div>
    <div class="swap-actions">
      <button class="swap-remove" id="swapRemoveBtn" onclick="swapRemove()">비우기</button>
      <button class="swap-cancel" onclick="closeSwap()">닫기</button>
    </div>
  </div>
</div>

<!-- ══════════════ CALENDAR ══════════════ -->
<div class="screen active" id="scrCal">
  <div class="hdr">

// ── 공휴일 로드 ──
async function loadHolidays(year){
  try {
    // 공공 API 대신 알려진 공휴일 하드코딩 + 웹 검색 불가 환경 대비
    const fixed = {
      [`${year}-01-01`]:'신정',
      [`${year}-03-01`]:'삼일절',
      [`${year}-05-05`]:'어린이날',
      [`${year}-06-06`]:'현충일',
      [`${year}-08-15`]:'광복절',
      [`${year}-10-03`]:'개천절',
      [`${year}-10-09`]:'한글날',
      [`${year}-12-25`]:'크리스마스',
    };
    // 2026 추가 공휴일
    if(year===2026){
      fixed['2026-02-17']='설날';
      fixed['2026-02-18']='설날';
      fixed['2026-02-19']='설날';
      fixed['2026-05-24']='부처님오신날';
      fixed['2026-06-03']='지방선거일';
      fixed['2026-09-24']='추석';
      fixed['2026-09-25']='추석';
      fixed['2026-09-26']='추석';
    }
    if(year===2025){
      fixed['2025-01-28']='설날';
      fixed['2025-01-29']='설날';
      fixed['2025-01-30']='설날';
      fixed['2025-05-05']='어린이날/부처님오신날';
      fixed['2025-10-05']='추석';
      fixed['2025-10-06']='추석';
      fixed['2025-10-07']='추석';
    }
    koHolidays = {...koHolidays, ...fixed};
  } catch(e){ console.warn('공휴일 로드 실패', e); }
}

// ── 주차 계산 ──
function getWeekRange(tueSunday){
  // tueSunday: 해당 주의 화요일 Date 객체
  const mon = addD(tueSunday, 6);
  return { start: fmt(tueSunday), end: fmt(mon) };
}

function getTuesdays(year, month){
  // 해당 월에 포함된 화~익주월 블록의 화요일 목록
  const tues = [];
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  // 이전 달 화요일도 포함 (블록이 이전달에 시작할 수 있음)
  let d = new Date(year, month-1, 1);
  while(d <= addD(last, 7)){
    if(d.getDay()===2){
      const end = addD(d,6);
      // 블록이 이 달과 겹치면 포함
      if(end >= first && d <= last) tues.push(new Date(d));
    }
    d = addD(d,1);
  }
  return tues;
}

function weekId(tueDateStr){ return `W_${tueDateStr}`; }

// ── 캘린더 렌더 ──
function renderCal(){
  const today = new Date();
  if(!calYear){ calYear=today.getFullYear(); calMonth=today.getMonth(); }
  document.getElementById('calMonth').textContent = `${calYear}년 ${MONTHS[calMonth]}`;

  const grid = document.getElementById('calGrid');
  // DOW headers
  let h = DOW.map((d,i)=>`<div class="cal-dow">${d}</div>`).join('');

  // 이 달의 화요일 기반 주 블록들
  const tues = getTuesdays(calYear, calMonth);
  const weekBlocks = tues.map(t=>({
    tue: t, tueStr: fmt(t), endStr: fmt(addD(t,6))
  }));

  // 날짜 셀 생성
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // 달력을 주 단위로 렌더 (week-block 방식)
  // 먼저 전체 날짜 배열 생성
  const cells = [];
  // 이전달 빈칸
  for(let i=0;i<firstDay;i++){
    const d = new Date(calYear, calMonth, -firstDay+i+1);
    cells.push({d, thisMonth:false});
  }
  for(let i=1;i<=daysInMonth;i++){
    cells.push({d:new Date(calYear,calMonth,i), thisMonth:true});
  }
  // 다음달 빈칸
  const remaining = 7 - (cells.length%7);
  if(remaining<7) for(let i=1;i<=remaining;i++) cells.push({d:new Date(calYear,calMonth+1,i),thisMonth:false});

  // 주 단위로 묶기
  const weeks = [];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));

  h += DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // 실제 렌더
  let html = ['일','월','화','수','목','금','토'].map(d=>`<div class="cal-dow">${d}</div>`).join('');

  weeks.forEach(week=>{
    // 이 주의 화요일 찾기
    const tuCell = week.find(c=>c.d.getDay()===2);
    const wBlock = tuCell ? weekBlocks.find(w=>fmt(w.tue)===fmt(tuCell.d)) : null;

    const dayHtml = week.map(({d,thisMonth})=>{
      const ds = fmt(d);
      const dw = d.getDay();
      const isToday = fmt(d)===fmt(today);
      const hol = koHolidays[ds];
      let cls = 'cal-day';
      if(!thisMonth) cls+=' other-month';
      if(dw===0) cls+=' sun';
      if(dw===6) cls+=' sat';
      if(isToday) cls+=' today';
      if(hol) cls+=' hol';
      return `<div class="${cls}">
        <div class="dn">${d.getDate()}</div>
        ${hol?`<div class="hol-badge">${hol}</div>`:''}
      </div>`;
    }).join('');

    if(wBlock){
      html += `<div class="week-block" onclick="openWeek('${wBlock.tueStr}','${wBlock.endStr}')" title="${wBlock.tueStr} ~ ${wBlock.endStr}">
        ${dayHtml}
      </div>`;
    } else {
      html += dayHtml;
    }
  });

  grid.innerHTML = html;
}

function calMove(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCal();
}

// ── 주차 열기 ──
async function openWeek(startStr, endStr){
  sw('scrWeek');
  curWeekId = weekId(startStr);
  conMemberId=null; conBlocked={};
  activeTool=null; updateToolUI();

  const s=pd(startStr), e=pd(endStr);
  document.getElementById('weekTitle').textContent =
    `${s.getMonth()+1}/${s.getDate()}(화) ~ ${e.getMonth()+1}/${e.getDate()}(월)`;

  await loadHolidays(s.getFullYear());
  if(e.getFullYear()!==s.getFullYear()) await loadHolidays(e.getFullYear());

  // DB에서 주차 데이터 로드
  let {data:wdata} = await sb.from('weeks').select('*').eq('id',curWeekId).single();
  if(!wdata){
    wdata = {id:curWeekId, start_date:startStr, end_date:endStr, day_config:{}, assignment:{}, fixed_counts:{}};
    await sb.from('weeks').insert(wdata);
  }
  curWeekData = {
    ...wdata,
    day_config: wdata.day_config||{},
    assignment: wdata.assignment||{},
    fixed_counts: wdata.fixed_counts||{}
  };

  // 제한사항 로드
  const {data:cons} = await sb.from('constraints').select('*').eq('week_id',curWeekId);
  constraints = {};
  (cons||[]).forEach(c=>{ constraints[c.member_id]=c.blocked_slots||{}; });

  renderWeekGrid();
  // 기존 편성 결과 있으면 통계/공정성 표시
  if(Object.keys(curWeekData.assignment||{}).length>0){
    renderStats();
    calcFairness();
    document.getElementById('genBar').style.display='flex';
  } else {
    renderGenBar();
    document.getElementById('statsPanel').innerHTML='';
  }
}

// ── 주차 그리드 렌더 ──
function buildDays(){
  const days=[];
  const s=pd(curWeekData.start_date), e=pd(curWeekData.end_date);
  for(let d=new Date(s);d<=e;d=addD(d,1)) days.push(fmt(d));
  return days;
}

function renderWeekGrid(){
  const days = buildDays();
  const isCon = activeTool==='con';
  const grid = document.getElementById('wkGrid');

  grid.innerHTML = days.map(ds=>{
    const dw = pd(ds).getDay();
    const isHol = isHolAny(ds);
    const holName = koHolidays[ds] || (isBuHol(ds)?'부대휴일':'');
    const slotArr = getSlots(ds);

    let hdCls = 'wk-col-hd';
    if(dw===0) hdCls+=' is-sun';
    if(dw===6) hdCls+=' is-sat';
    if(isHol) hdCls+=' is-hol';

    const slotsHtml = isCon && conMemberId
      ? slotArr.map(sl=>{
          const key=slotKey(ds,sl);
          const bk=!!conBlocked[key];
          const isBrunch=sl==='브런치';
          return `<div class="con-slot${bk?' blocked':''}${isBrunch?' con-brunch':''}" onclick="togConSlot('${key}',this)">${sl}</div>`;
        }).join('')
      : slotArr.map(sl=>renderSlotCell(ds,sl)).join('');

    return `<div class="wk-col">
      <div class="${hdCls}">
        <div class="dow">${DOW[dw]}</div>
        <div class="date">${ds.slice(5)}${holName?`<br><span class="hol-badge">${holName}</span>`:''}</div>
      </div>
      ${slotsHtml}
    </div>`;
  }).join('');
}

function renderSlotCell(ds, sl){
  const key = slotKey(ds,sl);
  const cfg = curWeekData.day_config[key]||{};
  const isJjam = !!cfg.jjam;
  const isPlus = !!cfg.plus;
  const isHolSlot = isHolAny(ds);
  const asgn = curWeekData.assignment[key]||[];
  const memberCount = isPlus ? 3 : 2;

  // 경고: 제한 걸린 사람이 배정된 경우
  const warnIds = asgn.filter(id=>(constraints[id]||{})[key]);

  let cls='slot-cell';
  if(isJjam) cls+=' is-jjam';
  if(isPlus) cls+=' is-plus';
  if(isHolSlot) cls+=' is-hol-slot';

  const names = asgn.map((id,idx)=>{
    const m = members.find(x=>x.id===id);
    const warn = warnIds.includes(id);
    return m ? `<div class="slot-name-tag${warn?' warn':''}" onclick="event.stopPropagation();openSwap('${key}',${idx})">${m.name}${warn?' ⚠️':''}</div>` : '';
  }).join('');

  const hasAnyAssign = Object.keys(curWeekData.assignment).length>0;
  const emptyBtn = (hasAnyAssign && !isHolSlot && asgn.length<memberCount)
    ? `<div class="slot-add" onclick="event.stopPropagation();openSwap('${key}',${asgn.length})">+ 추가</div>` : '';

  const badges = [isJjam?'<span class="jjam-badge">짬</span>':''].filter(Boolean).join('');

  return `<div class="${cls}" onclick="onSlotClick('${ds}','${sl}')">
    <div class="slot-label">${sl} ${badges}</div>
    ${asgn.length ? `<div class="slot-names">${names}${emptyBtn}</div>` : (hasAnyAssign && !isHolSlot ? `<div class="slot-names">${emptyBtn}</div>` : `<div class="slot-empty">${isHolSlot?'휴일':'미편성'}</div>`)}
  </div>`;
}

// ── 슬롯 클릭 ──
function onSlotClick(ds, sl){
  if(isHolAny(ds)) return;
  if(!activeTool) return;
  const key=slotKey(ds,sl);
  if(!curWeekData.day_config[key]) curWeekData.day_config[key]={};
  const cfg=curWeekData.day_config[key];

  if(activeTool==='jjam'){ cfg.jjam=!cfg.jjam; }
  else if(activeTool==='plus'){ cfg.plus=!cfg.plus; }
  else if(activeTool==='hol'){
    // 날 전체 토글
    const allDs = getSlots(ds);
    const wasHol = !!curWeekData.day_config[`${ds}_hol`];
    curWeekData.day_config[`${ds}_hol`]={hol:!wasHol};
  }
  saveWeekDebounced();
  renderWeekGrid();
}

// 부대휴일 날짜 판별 재정의
function isBuHol(ds){
  return !!(curWeekData?.day_config?.[`${ds}_hol`]?.hol);
}

function toggleTool(tool){

  else { activeTool=tool; }

}

function updateToolUI(){
  ['jjam','plus','hol'].forEach(t=>{
    const btn=document.getElementById(`tool${t.charAt(0).toUpperCase()+t.slice(1)}`);
    if(!btn)return;
    btn.className='dd-item';
    if(activeTool===t) btn.classList.add(`active-${t}`);
  });
  const conBtn=document.getElementById('toolCon');
  if(conBtn){ conBtn.className='tool-btn-main'; if(activeTool==='con') conBtn.classList.add('active-con'); }
}

  conBlocked = constraints[mid] ? {...constraints[mid]} : {};

function togConSlot(key, el){
  conBlocked[key]=!conBlocked[key];
  if(!conBlocked[key]) delete conBlocked[key];
  el.classList.toggle('blocked');
}

// ── 횟수 입력 모달 ──
let countsDraft={};

function totalSeats(){
  const days=buildDays();
  let total=0;
  days.forEach(ds=>{
    if(isHolAny(ds)) return;
    getSlots(ds).forEach(sl=>{
      const cfg=curWeekData.day_config[slotKey(ds,sl)]||{};
      total+=cfg.plus?3:2;
    });
  });
  return total;
}

function openCountsModal(){
  if(!members.length){ toast('먼저 인원을 추가하세요'); return; }
  // 기존 저장된 횟수 불러오기, 없으면 0
  countsDraft={};
  members.forEach(m=>{ countsDraft[m.id]=(curWeekData.fixed_counts||{})[m.id]||0; });
  renderCountsModal();
  document.getElementById('countsOverlay').classList.add('open');
}

function closeCountsModal(){
  document.getElementById('countsOverlay').classList.remove('open');
}

function renderCountsModal(){
  const seats=totalSeats();
  const sum=Object.values(countsDraft).reduce((a,b)=>a+b,0);
  const sm=document.getElementById('countsSummary');
  const diff=seats-sum;
  sm.className='counts-summary '+(diff===0?'ok':'bad');
  sm.textContent = diff===0
    ? `✅ 합계 ${sum} = 전체 자리 ${seats}`
    : `합계 ${sum} / 전체 자리 ${seats} (${diff>0?'+':''}${diff})`;

  document.getElementById('countsList').innerHTML = members.map(m=>
    `<div class="count-row">
      <span class="count-name">${m.name}</span>
      <div class="count-stepper">
        <button onclick="stepCount('${m.id}',-1)">−</button>
        <span class="count-val" id="cv_${m.id}">${countsDraft[m.id]}</span>
        <button onclick="stepCount('${m.id}',1)">+</button>
      </div>
    </div>`
  ).join('');
}

function stepCount(mid, d){
  countsDraft[mid]=Math.max(0,(countsDraft[mid]||0)+d);
  document.getElementById(`cv_${mid}`).textContent=countsDraft[mid];
  // 합계만 갱신
  const seats=totalSeats();
  const sum=Object.values(countsDraft).reduce((a,b)=>a+b,0);
  const sm=document.getElementById('countsSummary');
  const diff=seats-sum;
  sm.className='counts-summary '+(diff===0?'ok':'bad');
  sm.textContent = diff===0
    ? `✅ 합계 ${sum} = 전체 자리 ${seats}`
    : `합계 ${sum} / 전체 자리 ${seats} (${diff>0?'+':''}${diff})`;
}

function autoFillCounts(){
  const seats=totalSeats();
  const n=members.length;
  if(!n) return;
  const base=Math.floor(seats/n), extra=seats%n;
  const shuffled=[...members].sort(()=>Math.random()-0.5);
  countsDraft={};
  shuffled.forEach((m,i)=>{ countsDraft[m.id]=base+(i<extra?1:0); });
  renderCountsModal();
  toast('자동 균등 배분됨');
}

async function saveCountsModal(){
  const seats=totalSeats();
  const sum=Object.values(countsDraft).reduce((a,b)=>a+b,0);
  if(sum!==seats){
    if(!confirm(`합계(${sum})가 전체 자리(${seats})와 안 맞아요.\n그래도 저장할까요?`)) return;
  }
  curWeekData.fixed_counts={...countsDraft};
  await saveWeek();
  closeCountsModal();
  toast('횟수 저장 완료! 이제 편성 생성하세요');
}

// ── 슬롯 수동 편집 (교체) ──
let swapKey=null, swapIdx=null;

function openSwap(key, idx){
  swapKey=key; swapIdx=idx;
  const [ds,sl]=key.split('_');
  const asgn=curWeekData.assignment[key]||[];
  const curId=asgn[idx];
  const curName=curId ? (members.find(m=>m.id===curId)?.name||'') : null;

  document.getElementById('swapTitle').textContent = curName ? `${curName} 교체` : '인원 추가';
  document.getElementById('swapSub').textContent = `${dowKr(ds)} ${ds.slice(5)} ${sl}`;
  document.getElementById('swapRemoveBtn').style.display = curName ? 'block' : 'none';

  // 후보 목록: 전체 인원, 제한 여부 표시
  document.getElementById('swapList').innerHTML = members.map(m=>{
    const blocked=!!(constraints[m.id]||{})[key];
    const already=asgn.includes(m.id) && m.id!==curId;
    const isCur=m.id===curId;
    let cls='swap-item';
    if(blocked) cls+=' blocked';
    if(already) cls+=' disabled';
    if(isCur) cls+=' current';
    return `<button class="${cls}" ${already?'disabled':''} onclick="swapTo('${m.id}')">
      ${m.name}
      ${blocked?'<span class="swap-warn">⚠️ 제한</span>':''}
      ${already?'<span class="swap-tag">이미 배정</span>':''}
      ${isCur?'<span class="swap-tag cur">현재</span>':''}
    </button>`;
  }).join('');

  document.getElementById('swapOverlay').classList.add('open');
}

function closeSwap(){
  document.getElementById('swapOverlay').classList.remove('open');
  swapKey=null; swapIdx=null;
}

function swapTo(mid){
  const asgn=[...(curWeekData.assignment[swapKey]||[])];
  asgn[swapIdx]=mid;
  curWeekData.assignment[swapKey]=asgn;
  saveWeekDebounced();
  renderWeekGrid();
  renderStats();
  calcFairness();
  closeSwap();
  toast('변경됨');
}

function swapRemove(){
  const asgn=[...(curWeekData.assignment[swapKey]||[])];
  asgn.splice(swapIdx,1);
  curWeekData.assignment[swapKey]=asgn;
  saveWeekDebounced();
  renderWeekGrid();
  renderStats();
  calcFairness();
  closeSwap();
  toast('비웠어');
}

async function saveConstraints(){
  if(!conMemberId) return;
  await sb.from('constraints').upsert(
    {week_id:curWeekId, member_id:conMemberId, blocked_slots:conBlocked, updated_at:new Date().toISOString()},
    {onConflict:'week_id,member_id'}
  );
  constraints[conMemberId]={...conBlocked};
  toast('제한사항 저장 완료!');
  renderWeekGrid();
}

// ── 편성 생성 ──
function genAssignment(){
  if(!members.length){ toast('먼저 인원을 추가하세요'); return; }
  const days=buildDays();
  const slots=[];
  days.forEach(ds=>{
    if(isHolAny(ds)) return;
    getSlots(ds).forEach(sl=>{
      const key=slotKey(ds,sl);
      const cfg=curWeekData.day_config[key]||{};
      slots.push({ds,sl,key,jjam:!!cfg.jjam,count:cfg.plus?3:2});
    });
  });

  // 총 슬롯 자리 수
  const totalSeatsN = slots.reduce((s,sl)=>s+sl.count,0);
  const n = members.length;

  // quota 결정: 입력된 fixed_counts 있으면 사용, 없으면 자동 균등
  const saved=curWeekData.fixed_counts||{};
  const savedSum=members.reduce((a,m)=>a+(saved[m.id]||0),0);
  let quota={};
  if(savedSum>0){
    // 입력값 사용
    members.forEach(m=>{ quota[m.id]=saved[m.id]||0; });
    if(savedSum!==totalSeatsN){
      toast(`⚠️ 입력 합계(${savedSum})와 자리(${totalSeatsN})가 다름`, 3000);
    }
  } else {
    // 자동 균등
    const base=Math.floor(totalSeatsN/n), extra=totalSeatsN%n;
    const shuffled=[...members].sort(()=>Math.random()-0.5);
    shuffled.forEach((m,i)=>{ quota[m.id]=base+(i<extra?1:0); });
  }

  // 짬식조 별도 배분
  const jjamSeats = slots.filter(s=>s.jjam).reduce((a,s)=>a+s.count,0);
  const jBase=Math.floor(jjamSeats/n), jExtra=jjamSeats%n;
  const jShuffled=[...members].sort(()=>Math.random()-0.5);
  const jQuota={};
  jShuffled.forEach((m,i)=>{ jQuota[m.id]=jBase+(i<jExtra?1:0); });

  // 희소 슬롯 우선 정렬 (제한 없는 인원이 적은 슬롯부터)
  const canDo=(mid,key)=>!(constraints[mid]||{})[key];
  const sorted=[...slots].sort((a,b)=>{
    const ea=members.filter(m=>canDo(m.id,a.key)).length;
    const eb=members.filter(m=>canDo(m.id,b.key)).length;
    return ea-eb;
  });

  // 배정 실행 — 횟수 균등이 최우선, 제한은 가능하면 피함(soft)
  const counts={};
  const jCounts={};
  members.forEach(m=>{ counts[m.id]=0; jCounts[m.id]=0; });
  const result={};

  let remainingSlots=sorted.length;
  for(const sl of sorted){
    remainingSlots--;
    // 각 인원의 남은 필요 횟수
    const need=(m)=>quota[m.id]-counts[m.id];

    const pickScore=(m)=>{
      // 긴급도: 남은 슬롯이 적은데 quota 많이 남았으면 무조건 우선
      // (남은 필요 횟수가 많을수록 점수 낮게 = 우선)
      const urgency = -need(m)*10000;
      // 제한 페널티 (긴급도보다 약하게)
      const blocked = canDo(m.id,sl.key) ? 0 : 500;
      // 짬식조/총횟수 균등
      const usage = sl.jjam ? jCounts[m.id]*100+counts[m.id] : counts[m.id]*100;
      return urgency + blocked + usage + Math.random();
    };

    // quota 남은 사람 우선, 부족하면 전체
    let pool=members.filter(m=>need(m)>0);
    if(pool.length<sl.count) pool=[...members];

    const ranked=[...pool].sort((a,b)=>pickScore(a)-pickScore(b));
    const picked=[];
    for(const m of ranked){
      if(picked.length>=sl.count) break;
      if(picked.includes(m)) continue;
      picked.push(m);
    }
    result[sl.key]=picked.map(m=>m.id);
    picked.forEach(m=>{ counts[m.id]++; if(sl.jjam)jCounts[m.id]++; });
  }

  curWeekData.assignment=result;
  curWeekData.fixed_counts=quota;
  saveWeekDebounced();
  renderWeekGrid();
  renderStats();
  document.getElementById('genBar').style.display='flex';
  const score=calcFairness();
  toast(`편성 완료! 공정성 ${score}%`);
}

// 현재 assignment 기준으로 통계 계산
function computeStats(){
  const counts={}, jCounts={}, slotsByMember={};
  members.forEach(m=>{ counts[m.id]=0; jCounts[m.id]=0; slotsByMember[m.id]=[]; });
  const days=buildDays();
  days.forEach(ds=>{
    if(isHolAny(ds)) return;
    getSlots(ds).forEach(sl=>{
      const key=slotKey(ds,sl);
      const cfg=curWeekData.day_config[key]||{};
      const asgn=curWeekData.assignment[key]||[];
      asgn.forEach(id=>{
        if(counts[id]===undefined) return;
        counts[id]++;
        if(cfg.jjam) jCounts[id]++;
        const warn=!!(constraints[id]||{})[key];
        slotsByMember[id].push({ds,sl,jjam:!!cfg.jjam,warn});
      });
    });
  });
  return {counts,jCounts,slotsByMember};
}

function calcFairness(){
  const {counts,jCounts}=computeStats();
  const vals=members.map(m=>counts[m.id]||0);
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  const variance=vals.reduce((a,v)=>a+(v-mean)**2,0)/vals.length;
  const score=Math.max(0,Math.round(100-variance*20));
  document.getElementById('scoreVal').textContent=`${score}%`;
  renderBalanceBars(counts,jCounts);
  return score;
}

// 개인별 상세 통계 패널
function renderStats(){
  const {counts,jCounts,slotsByMember}=computeStats();
  const el=document.getElementById('statsPanel');
  if(!el) return;
  // 횟수 많은 순 정렬
  const sorted=[...members].sort((a,b)=>(counts[b.id]||0)-(counts[a.id]||0));
  const maxCount=Math.max(...members.map(m=>counts[m.id]||0),1);
  el.innerHTML=`<div class="stats-head">인원별 배식 현황</div>` + sorted.map(m=>{
    const c=counts[m.id]||0, j=jCounts[m.id]||0;
    const slots=slotsByMember[m.id]||[];
    const slotTags=slots.map(s=>{
      const label=`${dowKr(s.ds)} ${s.sl}`;
      let cls='stat-slot';
      if(s.jjam) cls+=' jjam';
      if(s.warn) cls+=' warn';
      return `<span class="${cls}">${label}${s.jjam?' 🔥':''}${s.warn?' ⚠️':''}</span>`;
    }).join('');
    const barW=Math.round(c/maxCount*100);
    return `<div class="stat-card">
      <div class="stat-card-top">
        <span class="stat-name">${m.name}</span>
        <span class="stat-counts">일반 <b>${c-j}</b> · 짬식조 <b class="jj">${j}</b></span>
      </div>
      <div class="stat-bar-track"><div class="stat-bar" style="width:${barW}%;"></div></div>
      ${slots.length?`<div class="stat-slots">${slotTags}</div>`:`<div class="stat-empty">배정 없음</div>`}
    </div>`;
  }).join('');
}

async function resetWeek(){
  if(!confirm("이번 주차 편성 결과와 제한사항을 모두 초기화할까요?")) return;
  curWeekData.assignment={};
  curWeekData.day_config={};
  curWeekData.fixed_counts={};
  await sb.from("constraints").delete().eq("week_id",curWeekId);
  await saveWeek();
  constraints={};
  document.getElementById("genBar").style.display="none";
  document.getElementById("statsPanel").innerHTML="";
  activeTool=null; conMemberId=null; conBlocked={};
  updateToolUI();
  renderWeekGrid();
  toast("초기화 완료!");
}

function renderBalanceBars(counts,jCounts){
  const el=document.getElementById('balanceBars');
  const maxVal=Math.max(...Object.values(counts),1);
  el.innerHTML=members.map(m=>{
    const h=Math.round((counts[m.id]||0)/maxVal*28);
    const jh=Math.round((jCounts[m.id]||0)/maxVal*28);
    return `<div class="bbar-wrap">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:28px;gap:1px;">
        ${jCounts[m.id]?`<div class="bbar jjam" style="height:${jh}px;width:100%;"></div>`:''}
        <div class="bbar" style="height:${Math.max(h-jh,2)}px;width:100%;"></div>
      </div>
      <div class="bbar-name">${m.name}</div>
    </div>`;
  }).join('');
}

function renderGenBar(){
  document.getElementById('genBar').style.display='none';
}

// ── 저장 ──
let saveTimer=null;
function saveWeekDebounced(){clearTimeout(saveTimer);saveTimer=setTimeout(saveWeek,800);}
async function saveWeek(){
  if(!curWeekData)return;
  await sb.from('weeks').upsert({
    id:curWeekData.id,
    start_date:curWeekData.start_date,
    end_date:curWeekData.end_date,
    day_config:curWeekData.day_config,
    assignment:curWeekData.assignment,
    fixed_counts:curWeekData.fixed_counts,
    updated_at:new Date().toISOString()
  });
}

// ── 인원 관리 ──
async function loadMembers(){
  const {data}=await sb.from('members').select('*').order('sort_order').order('created_at');
  members=data||[];
}

function renderMemList(){
  const el=document.getElementById('memList');
  if(!members.length){el.innerHTML='<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">아직 인원이 없어요</div>';return;}
  el.innerHTML=members.map((m,i)=>
    `<div class="mem-row">
      <span class="morder">${String(i+1).padStart(2,'0')}</span>
      <span class="mname">${m.name}</span>
      <button class="mem-del" onclick="deleteMember('${m.id}')">×</button>
    </div>`
  ).join('');
}

async function addMember(){
  const inp=document.getElementById('newName');
  const name=inp.value.trim(); if(!name)return;
  const {data,error}=await sb.from('members').insert({name,sort_order:members.length}).select().single();
  if(error){toast('이미 있는 이름이에요');return;}
  members.push(data); inp.value='';
  renderMemList(); toast(`${name} 추가됨`);
}

async function deleteMember(id){
  await sb.from('members').delete().eq('id',id);
  members=members.filter(m=>m.id!==id);
  renderMemList();
}

// ── 시작 ──
async function init(){
  await loadHolidays(new Date().getFullYear());
  await loadHolidays(new Date().getFullYear()+1);
  await loadMembers();
  renderCal();
}

document.addEventListener('click', (e)=>{
  const wrap = e.target.closest('.admin-menu-wrap');
  if(!wrap) closeAdminMenu();
});

init();
</script>
